<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDAVGK - Confirmation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Nama Web */
        .header {
            position: absolute;
            top: 30px;
            left: 40px;
        }

        .web-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Card Tunggal */
        .glass-table {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 1s ease-out;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .table-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #00c6ff;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0, 198, 255, 0.3);
            padding-bottom: 10px;
        }

        .table-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        /* Tombol Utama */
        .btn-download {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: inline-block;
            width: 100%;
        }

        .btn-download:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
        }

        /* Overlay Notifikasi */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* Sembunyi secara default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00c6ff;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: #fff;
        }

        .modal p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 20px;
        }

        .btn-confirm {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        /* State Tombol Yakin saat mati */
        .btn-confirm:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .btn-confirm:enabled {
            background: #00c6ff;
            color: white;
        }

        .btn-cancel {
            background: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            margin-right: 10px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { width: 100%; text-align: center; left: 0; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="web-name">PANDAVGK</h1>
    </header>

    <div class="glass-table">
        <h2 class="table-title">VGK BARAT BULE</h2>
        <div class="table-text">
            46 VIDEO BARAT YANG TERBARU GACOR POKONYA.
        </div>
        <button class="btn-download" onclick="showModal()">DOWNLOAD SEKARANG</button>
    </div>

    <div id="modalOverlay" class="overlay">
        <div class="modal">
            <h3>Konfirmasi</h3>
            <p>Apakah kamu yakin melakukan hal ini?</p>
            <div style="margin-bottom: 20px; font-weight: bold; color: #00c6ff;">
                Tunggu <span id="countdown">5</span> detik...
            </div>
            <button class="btn-confirm btn-cancel" onclick="hideModal()">BATAL</button>
            <button id="confirmBtn" class="btn-confirm" disabled onclick="actionYakin()">YAKIN</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalOverlay');
        const confirmBtn = document.getElementById('confirmBtn');
        const countdownSpan = document.getElementById('countdown');
        let timer;

        function showModal() {
            modal.style.display = 'flex';
            let timeLeft = 5;
            
            // Reset tombol dan teks
            confirmBtn.disabled = true;
            countdownSpan.innerText = timeLeft;

            timer = setInterval(() => {
                timeLeft--;
                countdownSpan.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    confirmBtn.disabled = false;
                    countdownSpan.parentElement.innerText = "Tombol sekarang aktif!";
                }
            }, 1000);
        }

        function hideModal() {
            modal.style.display = 'none';
            clearInterval(timer);
            // Reload simple agar teks countdown kembali seperti semula jika dibuka lagi
            location.reload(); 
        }

        function actionYakin() {
            alert("Proses Download Dimulai!");
            // Anda bisa arahkan ke link download di sini:
            // window.location.href = "https://link-download-anda.com";
            hideModal();
        }
    </script>

</body>
</html>
