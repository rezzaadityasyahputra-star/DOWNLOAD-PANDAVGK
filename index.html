<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDAVGK - Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #0a0a0c;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mengunci scroll agar tidak gerak-gerak */
            color: #ffffff;
            position: relative;
        }

        /* Background Bergerak (Animated Mesh) */
        .bg-animated {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            z-index: -2;
        }

        .moving-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 198, 255, 0.1), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: moveAround 15s linear infinite;
        }

        @keyframes moveAround {
            0% { transform: translate(-20%, -20%); }
            33% { transform: translate(30%, 10%); }
            66% { transform: translate(-10%, 40%); }
            100% { transform: translate(-20%, -20%); }
        }

        /* Logo Panda Kiri Atas */
        .logo-panda {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .panda-icon {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* Header Tengah */
        .header-center {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 5;
        }

        .web-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(to right, #ffffff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Card Utama */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 35px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 2;
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #00c6ff;
            margin-bottom: 15px;
        }

        .card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .btn-main {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-main:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 198, 255, 0.4);
        }

        /* Modal Overlay - FIXED (Tidak Goyang) */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(12px);
        }

        .modal {
            background: #0d0d12;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #00c6ff;
            text-align: center;
            width: 350px;
        }

        .modal h3 { margin-bottom: 10px; font-weight: 800; }
        .modal p { color: #888; font-size: 0.85rem; margin-bottom: 25px; }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-modal {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-cancel { background: #1a1a1a; color: #ff4d4d; }
        .btn-yakin { background: #00c6ff; color: #fff; }
        .btn-yakin:disabled { background: #222; color: #444; cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="moving-glow"></div>

    <div class="logo-panda">
        <div class="panda-icon">🐼</div>
        <span style="font-weight: 800; letter-spacing: 1px;"></span>
    </div>

    <header class="header-center">
        <h1 class="web-name">PANDAVGK</h1>
    </header>

    <div class="card">
        <h2>RATUSAN VIDEO READY</h2>
        <p>Gacor banget Brother, klik tombol di bawah buat langsung sikat videonya.</p>
        <button class="btn-main" onclick="showModal()">Akses Sekarang</button>
    </div>

    <div id="modalOverlay" class="overlay">
        <div class="modal">
            <h3>KONFIRMASI</h3>
            <p>Yakin mau lanjut, Brother?</p>
            
            <div id="timerDisplay" style="margin-bottom: 20px; color: #00c6ff; font-weight: 800;">
                Tunggu <span id="countdown">5</span>s
            </div>

            <div class="btn-group">
                <button class="btn-modal btn-cancel" onclick="hideModal()">Batal</button>
                <button id="confirmBtn" class="btn-modal btn-yakin" disabled onclick="actionYakin()">Yakin</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalOverlay');
        const confirmBtn = document.getElementById('confirmBtn');
        const countdownSpan = document.getElementById('countdown');
        let timer;

        function showModal() {
            modal.style.display = 'flex';
            let timeLeft = 5;
            confirmBtn.disabled = true;
            countdownSpan.innerText = timeLeft;

            timer = setInterval(() => {
                timeLeft--;
                countdownSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    confirmBtn.disabled = false;
                    document.getElementById('timerDisplay').innerText = "SIKAT SEKARANG!";
                }
            }, 1000);
        }

        function hideModal() {
            modal.style.display = 'none';
            clearInterval(timer);
            // Reset teks timer jika ditutup
            document.getElementById('timerDisplay').innerHTML = 'Tunggu <span id="countdown">5</span>s';
        }

        function actionYakin() {
            window.location.href = "https://tujuan-link-kamu.com";
        }
    </script>
</body>
</html>
